name: Unix PTY

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  unix-pty-apc:
    name: Unix PTY APC preservation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Test Unix PTY APC preservation
        run: cargo test -p pty --test unix_apc -- --nocapture
